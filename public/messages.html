<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dir6veymq/image/upload/v1777374357/6019309177320180754_xna8oi.jpg">
    <title>Message Logs | ebotconnect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00687b",
                        "primary-container": "#00a3c1",
                        "on-primary": "#ffffff",
                        "surface": "#f5fafc",
                        "on-surface": "#171c1e",
                        "surface-container": "#eaeff1",
                        "surface-container-low": "#eff4f7",
                        "outline-variant": "#bcc9cd",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav {
            background-color: #00687b;
            color: white !important;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex">
    <!-- Mobile Menu Button -->
    <div class="lg:hidden fixed top-4 left-4 z-[60]">
        <button id="menuBtn" class="p-3 bg-white border border-outline-variant/30 rounded-xl shadow-sm flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">menu</span>
        </button>
    </div>

    <!-- Mobile Overlay -->
    <div id="overlay" class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-white border-r border-outline-variant/30 flex flex-col fixed h-full z-50 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-on-primary text-xl" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
                </div>
                <span class="font-headline font-extrabold tracking-tighter text-2xl text-primary">ebotconnect</span>
            </div>
            <!-- Close button (Mobile Only) -->
            <button id="closeMenuBtn" class="lg:hidden text-on-surface-variant">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <nav class="flex-grow px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">dashboard</span>
                Dashboard
            </a>
            <a href="profile.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">business_center</span>
                Business Profile
            </a>
            <a href="connect.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">chat_bubble</span>
                WhatsApp Bot
            </a>
            <a href="pricing.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">payments</span>
                Subscription
            </a>
            <a href="messages.html" class="active-nav flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold">
                <span class="material-symbols-outlined">history</span>
                Message Logs
            </a>
        </nav>

        <div class="p-6 border-t border-outline-variant/20">
            <button id="logoutBtn" class="flex items-center gap-4 px-4 py-3 w-full rounded-xl text-error hover:bg-error-container/10 transition-all font-semibold">
                <span class="material-symbols-outlined">logout</span>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow lg:ml-72 p-6 lg:p-10">
        <header class="mb-10 pt-12 lg:pt-0">
            <h1 class="text-3xl lg:text-4xl font-headline font-extrabold text-on-surface tracking-tight mb-2">Message Logs</h1>
            <p class="text-on-surface-variant font-medium">History of all messages replied to by your bot.</p>
        </header>

        <div class="bg-white rounded-3xl border border-outline-variant/20 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-surface-container-low/50 border-b border-outline-variant/10">
                        <th class="p-6 text-sm font-bold uppercase tracking-widest text-on-surface-variant">Customer</th>
                        <th class="p-6 text-sm font-bold uppercase tracking-widest text-on-surface-variant">Message</th>
                        <th class="p-6 text-sm font-bold uppercase tracking-widest text-on-surface-variant">Bot Reply</th>
                        <th class="p-6 text-sm font-bold uppercase tracking-widest text-on-surface-variant">Time</th>
                    </tr>
                </thead>
                <tbody id="messageLogs">
                    <!-- Logs will appear here -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html';

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            });

            try {
                const res = await fetch('/api/dashboard/messages', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const messages = await res.json();

                const tbody = document.getElementById('messageLogs');
                if (messages.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-16 text-center text-on-surface-variant font-medium">No messages found.</td></tr>';
                    return;
                }

                messages.forEach(msg => {
                    const row = `
                        <tr class="border-b border-outline-variant/10 hover:bg-surface-container-low/30 transition-colors">
                            <td class="p-6">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-primary/5 text-primary flex items-center justify-center">
                                        <span class="material-symbols-outlined text-sm">person</span>
                                    </div>
                                    <span class="font-bold text-on-surface">${msg.customer_number}</span>
                                </div>
                            </td>
                            <td class="p-6 text-on-surface-variant text-sm max-w-xs">${msg.message}</td>
                            <td class="p-6">
                                <div class="bg-primary/5 p-3 rounded-xl border border-primary/10 text-primary text-sm font-medium">
                                    ${msg.bot_reply}
                                </div>
                            </td>
                            <td class="p-6">
                                <span class="text-xs font-bold text-outline uppercase tracking-tight">
                                    ${new Date(msg.created_at).toLocaleString()}
                                </span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error(err);
            }
        });
    </script>
    <script src="js/ui.js"></script>
</body>
</html>
