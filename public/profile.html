<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Business Profile | ebotconnect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00687b",
                        "primary-container": "#00a3c1",
                        "on-primary": "#ffffff",
                        "surface": "#f5fafc",
                        "on-surface": "#171c1e",
                        "surface-container": "#eaeff1",
                        "surface-container-low": "#eff4f7",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bcc9cd",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav {
            background-color: #00687b;
            color: white !important;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex">
    <!-- Mobile Menu Button -->
    <div class="lg:hidden fixed top-4 left-4 z-[60]">
        <button id="menuBtn" class="p-3 bg-white border border-outline-variant/30 rounded-xl shadow-sm flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">menu</span>
        </button>
    </div>

    <!-- Mobile Overlay -->
    <div id="overlay" class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-white border-r border-outline-variant/30 flex flex-col fixed h-full z-50 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-on-primary text-xl" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
                </div>
                <span class="font-headline font-extrabold tracking-tighter text-2xl text-primary">ebotconnect</span>
            </div>
            <!-- Close button (Mobile Only) -->
            <button id="closeMenuBtn" class="lg:hidden text-on-surface-variant">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <nav class="flex-grow px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">dashboard</span>
                Dashboard
            </a>
            <a href="profile.html" class="active-nav flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold">
                <span class="material-symbols-outlined">business_center</span>
                Business Profile
            </a>
            <a href="connect.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">chat_bubble</span>
                WhatsApp Bot
            </a>
            <a href="pricing.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">payments</span>
                Subscription
            </a>
            <a href="messages.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium">
                <span class="material-symbols-outlined">history</span>
                Message Logs
            </a>
        </nav>

        <div class="p-6 border-t border-outline-variant/20">
            <button id="logoutBtn" class="flex items-center gap-4 px-4 py-3 w-full rounded-xl text-error hover:bg-error-container/10 transition-all font-semibold">
                <span class="material-symbols-outlined">logout</span>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow lg:ml-72 p-6 lg:p-10">
        <header class="mb-10 pt-12 lg:pt-0">
            <h1 class="text-3xl lg:text-4xl font-headline font-extrabold text-on-surface tracking-tight mb-2">Business Profile</h1>
            <p class="text-on-surface-variant font-medium">Configure your bot's personality and business data.</p>
        </header>

        <div class="bg-white rounded-3xl border border-outline-variant/20 shadow-sm overflow-hidden max-w-4xl">
            <form id="profileForm" class="p-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="md:col-span-2 space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">Business Description</label>
                        <textarea id="description" name="description" rows="4" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="Tell the bot about your business..."></textarea>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">Products & Services</label>
                        <textarea id="products" name="products" rows="5" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="One per line: e.g., iPhone 13"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">Pricing Details</label>
                        <textarea id="prices" name="prices" rows="5" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="e.g., iPhone 13 - ₦500,000"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">FAQs</label>
                        <textarea id="faqs" name="faqs" rows="5" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="Question: Answer"></textarea>
                    </div>

                    <div class="space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">Working Hours</label>
                        <input type="text" id="working_hours" name="working_hours" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="e.g., Mon-Fri: 9am - 5pm">
                    </div>

                    <div class="space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">Welcome Message</label>
                        <input type="text" id="welcome_message" name="welcome_message" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="Sent when user first messages">
                    </div>

                    <div class="md:col-span-2 space-y-2">
                        <label class="font-bold text-sm text-on-surface-variant uppercase tracking-wider ml-1">Auto-Reply Message</label>
                        <textarea id="auto_reply_message" name="auto_reply_message" rows="3" class="w-full p-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none transition-all text-on-surface placeholder:text-outline/60" placeholder="Default message when bot doesn't know what to say"></textarea>
                    </div>
                </div>
                
                <div class="pt-4">
                    <button type="submit" class="bg-primary text-on-primary font-headline font-bold py-4 px-10 rounded-xl shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all">
                        Save Profile Settings
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html';

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            });

            try {
                const response = await fetch('/api/dashboard/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (response.ok && data) {
                    document.getElementById('description').value = data.description || '';
                    document.getElementById('products').value = data.products || '';
                    document.getElementById('prices').value = data.prices || '';
                    document.getElementById('faqs').value = data.faqs || '';
                    document.getElementById('working_hours').value = data.working_hours || '';
                    document.getElementById('welcome_message').value = data.welcome_message || '';
                    document.getElementById('auto_reply_message').value = data.auto_reply_message || '';
                }
            } catch (err) {
                console.error('Error loading profile:', err);
            }

            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const profileData = Object.fromEntries(formData.entries());

                try {
                    const res = await fetch('/api/dashboard/profile', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(profileData)
                    });

                    if (res.ok) {
                        alert('Profile updated successfully!');
                    } else {
                        alert('Failed to update profile.');
                    }
                } catch (err) {
                    console.error('Error saving profile:', err);
                }
            });
        });
    </script>
    <script src="js/ui.js"></script>
</body>
</html>
