<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Global Messages | ebotconnect</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00687b",
                        "surface": "#f5fafc",
                        "on-surface": "#171c1e",
                        "outline-variant": "#bcc9cd",
                    },
                    "fontFamily": { "headline": ["Manrope", "sans-serif"], "body": ["Inter", "sans-serif"] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-nav { background-color: #00687b; color: white !important; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex">
    <!-- Mobile Nav Toggle -->
    <div class="lg:hidden fixed top-4 left-4 z-[60]">
        <button id="menuBtn" class="p-3 bg-white border border-outline-variant/30 rounded-xl text-primary shadow-sm"><span class="material-symbols-outlined">menu</span></button>
    </div>
    <div id="overlay" class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-40 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-white border-r border-outline-variant/30 flex flex-col fixed h-full z-50 -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-primary rounded-lg text-on-primary"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">security</span></div>
                <span class="font-headline font-extrabold text-2xl text-primary tracking-tighter">Admin Panel</span>
            </div>
            <!-- Close button (Mobile Only) -->
            <button id="closeMenuBtn" class="lg:hidden text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
        </div>
        <nav class="flex-grow px-4 space-y-2">
            <a href="index.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium"><span class="material-symbols-outlined">dashboard</span>Dashboard</a>
            <a href="businesses.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium"><span class="material-symbols-outlined">corporate_fare</span>Businesses</a>
            <a href="subscriptions.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium"><span class="material-symbols-outlined">payments</span>Subscriptions</a>
            <a href="messages.html" class="active-nav flex items-center gap-4 px-4 py-3 rounded-xl font-semibold"><span class="material-symbols-outlined">forum</span>Global Messages</a>
            <a href="settings.html" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-surface-container transition-all text-on-surface-variant font-medium"><span class="material-symbols-outlined">settings</span>Platform Settings</a>
        </nav>
        <div class="p-6 border-t border-outline-variant/20">
            <button id="logoutBtn" class="flex items-center gap-4 px-4 py-3 w-full rounded-xl text-red-500 hover:bg-red-50 font-semibold transition-all">
                <span class="material-symbols-outlined">logout</span>Logout
            </button>
        </div>
    </aside>

    <main class="flex-grow lg:ml-72 p-6 lg:p-10">
        <header class="mb-10 pt-12 lg:pt-0 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-headline font-extrabold tracking-tight">Global Message Logs</h1>
                <p class="text-on-surface-variant font-medium">Monitoring AI-customer interactions platform-wide.</p>
            </div>
            
            <div class="flex flex-wrap gap-4">
                <select id="businessFilter" class="p-3 bg-white border border-outline-variant/20 rounded-xl text-sm font-medium outline-none focus:ring-2 focus:ring-primary/20">
                    <option value="">All Businesses</option>
                </select>
                <input type="date" id="dateFilter" class="p-3 bg-white border border-outline-variant/20 rounded-xl text-sm font-medium outline-none focus:ring-2 focus:ring-primary/20">
                <button onclick="fetchMessages()" class="px-6 py-3 bg-primary text-on-primary rounded-xl font-bold shadow-lg shadow-primary/20 hover:shadow-xl active:scale-[0.98] transition-all">Filter</button>
            </div>
        </header>

        <div class="bg-white rounded-3xl border border-outline-variant/20 shadow-sm overflow-hidden">
            <div class="p-8 overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-xs font-bold text-on-surface-variant uppercase tracking-widest border-b border-outline-variant/10">
                            <th class="pb-4">Business</th>
                            <th class="pb-4">Customer</th>
                            <th class="pb-4">Interaction</th>
                            <th class="pb-4 text-right">Time</th>
                        </tr>
                    </thead>
                    <tbody id="msgList" class="divide-y divide-outline-variant/10">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';

        async function initFilters() {
            try {
                const res = await fetch('/api/admin/businesses', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const businesses = await res.json();
                const select = document.getElementById('businessFilter');
                businesses.forEach(b => {
                    select.innerHTML += `<option value="${b.id}">${b.business_name}</option>`;
                });
            } catch (err) { console.error(err); }
        }

        async function fetchMessages() {
            const bizId = document.getElementById('businessFilter').value;
            const date = document.getElementById('dateFilter').value;
            let url = `/api/admin/messages?`;
            if (bizId) url += `businessId=${bizId}&`;
            if (date) url += `date=${date}`;

            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const tbody = document.getElementById('msgList');
                tbody.innerHTML = '';
                
                data.forEach(msg => {
                    tbody.innerHTML += `
                        <tr class="text-sm">
                            <td class="py-6">
                                <div class="font-bold text-primary">${msg.business_name}</div>
                            </td>
                            <td class="py-6 font-medium">${msg.customer_number}</td>
                            <td class="py-6">
                                <div class="p-3 bg-surface rounded-xl border border-outline-variant/10 mb-2">
                                    <div class="text-[10px] font-bold text-on-surface-variant uppercase mb-1">Customer</div>
                                    <div class="text-on-surface">${msg.message}</div>
                                </div>
                                <div class="p-3 bg-primary/5 rounded-xl border border-primary/10">
                                    <div class="text-[10px] font-bold text-primary uppercase mb-1">Bot Reply</div>
                                    <div class="text-on-surface font-medium">${msg.bot_reply}</div>
                                </div>
                            </td>
                            <td class="py-6 text-right">
                                <span class="text-xs font-bold text-on-surface-variant">${new Date(msg.created_at).toLocaleString()}</span>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        initFilters();
        fetchMessages();
    </script>
    <script src="../js/ui.js"></script>
</body>
</html>
